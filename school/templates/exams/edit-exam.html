{% extends 'Home/base.html' %}
{% load static %}

{% block body %}
<div class="page-wrapper">
    <div class="content container-fluid">
        <div class="page-header">
            <div class="row align-items-center">
                <div class="col">
                    <h3 class="page-title">Modifier l'examen</h3>
                    <ul class="breadcrumb">
                        <li class="breadcrumb-item"><a href="{% url 'exam_list' %}">Examens</a></li>
                        <li class="breadcrumb-item active">Modifier</li>
                    </ul>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-sm-12">
                <div class="card">
                    <div class="card-body">
                        <form method="POST">
                            {% csrf_token %}
                            <div class="row">
                                <div class="col-12">
                                    <h5 class="form-title">Informations de l'examen</h5>
                                </div>

                                <div class="col-12 col-sm-6">
                                    <div class="form-group">
                                        <label>Nom de l'examen <span class="text-danger">*</span></label>
                                        <input type="text" class="form-control" name="name" value="{{ exam.name }}"
                                            required>
                                    </div>
                                </div>

                                <div class="col-12 col-sm-6">
                                    <div class="form-group">
                                        <label>Type d'examen <span class="text-danger">*</span></label>
                                        <select class="form-control" name="exam_type" required>
                                            <option value="midterm" {% if exam.exam_type == 'midterm' %}selected{% endif%}>Examen mi-session</option>
                                            <option value="final" {% if exam.exam_type == 'final' %}selected{% endif %}>
                                                Examen final</option>
                                            <option value="quiz" {% if exam.exam_type == 'quiz' %}selected{% endif %}>Quiz
                                            </option>
                                            <option value="practical" {% if exam.exam_type == 'practical' %}selected{%endif %}>Examen pratique</option>
                                            <option value="project" {% if exam.exam_type == 'project' %}selected{% endif%}>Projet</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="col-12 col-sm-6">
                                    <div class="form-group">
                                        <label>Matière <span class="text-danger">*</span></label>
                                        <select class="form-control" name="subject" required>
                                            {% for subject in subjects %}
                                            <option value="{{ subject.id }}" {% if exam.subject.id == subject.id%}selected{% endif %}>{{ subject.name }} ({{ subject.code }})</option>
                                            {% endfor %}
                                        </select>
                                    </div>
                                </div>

                                <div class="col-12 col-sm-6">
                                    <div class="form-group">
                                        <label>Salle <span class="text-danger">*</span></label>
                                        <input type="text" class="form-control" name="room" value="{{ exam.room }}"
                                            required>
                                    </div>
                                </div>

                                <div class="col-12 col-sm-6">
                                    <div class="form-group">
                                        <label>Date <span class="text-danger">*</span></label>
                                        <input type="date" class="form-control" name="date"
                                            value="{{ exam.date|date:'Y-m-d' }}" required>
                                    </div>
                                </div>

                                <div class="col-12 col-sm-3">
                                    <div class="form-group">
                                        <label>Heure de début <span class="text-danger">*</span></label>
                                        <input type="time" class="form-control" name="start_time"
                                            value="{{ exam.start_time|time:'H:i' }}" required>
                                    </div>
                                </div>

                                <div class="col-12 col-sm-3">
                                    <div class="form-group">
                                        <label>Heure de fin <span class="text-danger">*</span></label>
                                        <input type="time" class="form-control" name="end_time"
                                            value="{{ exam.end_time|time:'H:i' }}" required>
                                    </div>
                                </div>

                                <div class="col-12 col-sm-6">
                                    <div class="form-group">
                                        <label>Note totale</label>
                                        <input type="number" class="form-control" name="total_marks"
                                            value="{{ exam.total_marks }}" min="0" step="0.5">
                                    </div>
                                </div>

                                <div class="col-12 col-sm-6">
                                    <div class="form-group">
                                        <label>Note de passage</label>
                                        <input type="number" class="form-control" name="passing_marks"
                                            value="{{ exam.passing_marks }}" min="0" step="0.5">
                                    </div>
                                </div>

                                <div class="col-12">
                                    <div class="form-group">
                                        <label>Description</label>
                                        <textarea class="form-control" name="description"
                                            rows="3">{{ exam.description }}</textarea>
                                    </div>
                                </div>

                                <div class="col-12">
                                    <button type="submit" class="btn btn-primary">Enregistrer</button>
                                    <a href="{% url 'exam_list' %}" class="btn btn-secondary">Annuler</a>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
