{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="utf-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0">
   <title>Preskool - Connexion</title>

   <!-- Favicon -->
   <link rel="shortcut icon" href="{% static 'assets/img/favicon.png' %}">
   <!-- Google Fonts -->
   <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,500;0,600;0,700;1,400&amp;display=swap">
   <!-- Bootstrap CSS -->
   <link rel="stylesheet" href="{% static 'assets/plugins/bootstrap/css/bootstrap.min.css' %}">
   <!-- Font Awesome CSS -->
   <link rel="stylesheet" href="{% static 'assets/plugins/fontawesome/css/fontawesome.min.css' %}">
   <link rel="stylesheet" href="{% static 'assets/plugins/fontawesome/css/all.min.css' %}">
   <!-- Custom CSS -->
   <link rel="stylesheet" href="{% static 'assets/css/style.css' %}">
</head>

<body>

   <div class="main-wrapper login-body">
      <div class="login-wrapper">
         <div class="container">
            <div class="loginbox">
               <div class="login-left">
                  <img class="img-fluid" src="{% static 'assets/img/logo-white.png' %}" alt="Logo">
               </div>
               <div class="login-right">
                  <div class="login-right-wrap">
                     <h1>Connexion</h1>
                     <p class="account-subtitle">Accédez à votre tableau de bord</p>

                     <!-- Messages d'erreur et de succès -->
                     {% if messages %}
                     {% for message in messages %}
                     <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                           <span aria-hidden="true">&times;</span>
                        </button>
                     </div>
                     {% endfor %}
                     {% endif %}

                     <!-- Formulaire de connexion -->
                     <form method="POST" action="{% url 'login' %}">
                        {% csrf_token %}
                        <div class="form-group">
                           <input class="form-control" type="text" name="username" placeholder="Nom d'utilisateur"
                              required>
                        </div>
                        <div class="form-group">
                           <input class="form-control" type="password" name="password" placeholder="Mot de passe"
                              required>
                        </div>
                        <div class="form-group">
                           <button class="btn btn-primary btn-block" type="submit">Se connecter</button>
                        </div>
                     </form>

                     <div class="text-center forgotpass">
                        <a href="{% url 'password_reset' %}">Mot de passe oublié ?</a>
                     </div>
                     <div class="login-or">
                        <span class="or-line"></span>
                        <span class="span-or">ou</span>
                     </div>
                     <div class="social-login">
                        <span>Se connecter avec</span>
                        <a href="#" class="facebook"><i class="fab fa-facebook-f"></i></a>
                        <a href="#" class="google"><i class="fab fa-google"></i></a>
                     </div>

                     <div class="text-center dont-have">
                        Pas encore de compte ? <a href="{% url 'register' %}">S'inscrire</a>
                     </div>
                  </div>
               </div>
            </div>
         </div>
      </div>
   </div>

   <!-- jQuery -->
   <script src="{% static 'assets/js/jquery-3.6.0.min.js' %}"></script>
   <!-- Bootstrap Core JS -->
   <script src="{% static 'assets/js/popper.min.js' %}"></script>
   <script src="{% static 'assets/plugins/bootstrap/js/bootstrap.min.js' %}"></script>
   <!-- Custom JS -->
   <script src="{% static 'assets/js/script.js' %}"></script>
</body>

</html>
