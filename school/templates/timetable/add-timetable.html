{% extends 'Home/base.html' %}
{% load static %}

{% block body %}
<div class="page-wrapper">
    <div class="content container-fluid">
        <div class="page-header">
            <div class="row align-items-center">
                <div class="col">
                    <h3 class="page-title">Ajouter un cours</h3>
                    <ul class="breadcrumb">
                        <li class="breadcrumb-item"><a href="{% url 'timetable_view' %}">Emploi du temps</a></li>
                        <li class="breadcrumb-item active">Ajouter</li>
                    </ul>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-sm-12">
                <div class="card">
                    <div class="card-body">
                        <form method="POST">
                            {% csrf_token %}
                            <div class="row">
                                <div class="col-12">
                                    <h5 class="form-title">Informations du cours</h5>
                                </div>

                                <div class="col-12 col-sm-6">
                                    <div class="form-group">
                                        <label>Jour <span class="text-danger">*</span></label>
                                        <select class="form-control" name="day" required>
                                            <option value="">-- Sélectionner --</option>
                                            {% for value, label in days %}
                                            <option value="{{ value }}">{{ label }}</option>
                                            {% endfor %}
                                        </select>
                                    </div>
                                </div>

                                <div class="col-12 col-sm-6">
                                    <div class="form-group">
                                        <label>Horaire <span class="text-danger">*</span></label>
                                        <select class="form-control" name="time_slot" required>
                                            <option value="">-- Sélectionner --</option>
                                            {% for value, label in time_slots %}
                                            <option value="{{ value }}">{{ label }}</option>
                                            {% endfor %}
                                        </select>
                                    </div>
                                </div>

                                <div class="col-12 col-sm-6">
                                    <div class="form-group">
                                        <label>Matière <span class="text-danger">*</span></label>
                                        <select class="form-control" name="subject" required>
                                            <option value="">-- Sélectionner --</option>
                                            {% for subject in subjects %}
                                            <option value="{{ subject.id }}">{{ subject.name }} ({{ subject.code }})
                                            </option>
                                            {% endfor %}
                                        </select>
                                    </div>
                                </div>

                                <div class="col-12 col-sm-6">
                                    <div class="form-group">
                                        <label>Enseignant <span class="text-danger">*</span></label>
                                        <select class="form-control" name="teacher" required>
                                            <option value="">-- Sélectionner --</option>
                                            {% for teacher in teachers %}
                                            <option value="{{ teacher.id }}">{{ teacher.first_name }} {{teacher.last_name }}</option>
                                            {% endfor %}
                                        </select>
                                    </div>
                                </div>

                                <div class="col-12 col-sm-6">
                                    <div class="form-group">
                                        <label>Salle de classe <span class="text-danger">*</span></label>
                                        <input type="text" class="form-control" name="classroom"
                                            placeholder="Ex: A101, B202" required>
                                    </div>
                                </div>

                                <div class="col-12 col-sm-6">
                                    <div class="form-group">
                                        <label>Groupe</label>
                                        <input type="text" class="form-control" name="group"
                                            placeholder="Ex: G1, G2, Master 1">
                                    </div>
                                </div>

                                <div class="col-12">
                                    <div class="form-group">
                                        <label>
                                            <input type="checkbox" name="is_active" checked> Actif
                                        </label>
                                    </div>
                                </div>

                                <div class="col-12">
                                    <button type="submit" class="btn btn-primary">Enregistrer</button>
                                    <a href="{% url 'timetable_view' %}" class="btn btn-secondary">Annuler</a>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
